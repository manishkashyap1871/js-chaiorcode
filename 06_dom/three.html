<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chai aur code</title>
</head>
<body style="background-color :black ; color :aliceblue">
    
</body>
<script>
    //add a element in the dom
    
    const div = document.createElement('div') //Step 1: Create a new <div>
    console.log(div) // Logs it in console

    // Step 2: Add class & ID
    div.className = 'main'
    div.id = Math.round(Math.random()*10+1)

    // Step 3: Add attributes
    div.setAttribute("title","generated title")

    // Step 4: Styling the div
    div.style.backgroundColor = "green"
    div.style.padding = "12px"


    //Step 5: Add text inside div
    //div.innerText = "chai aur code"
    const addText =document.createTextNode("chai aur code") //This is a better and optimized way
    div.appendChild(addText)

    //important : 	innerText → replaces content (slower for large updates)
    //	            createTextNode → more efficient & controlled DOM manipulation

    //Step 6: Add div to webpage
    document.body.appendChild(div)
</script>
</html>
